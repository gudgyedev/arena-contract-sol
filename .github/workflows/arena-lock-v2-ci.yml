name: arena-lock-v2-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  native-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Test
        run: cargo test --locked -p arena-lock-v2 -- --test-threads=1
      - name: Clippy
        run: cargo clippy --locked -p arena-lock-v2 --all-targets --all-features -- -D warnings
